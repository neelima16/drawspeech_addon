dataset: "LJSpeech"

path:
  corpus_path: "mini_demo/LJSpeech-1.1"
  TextGrid_path: "mini_demo/LJSpeech-1.1/TextGrid"
  raw_path: "mini_demo/LJSpeech-1.1/wavs"
  preprocessed_path: "mini_demo/features/phoneme_level"

preprocessing:
  audio:
    sampling_rate: 22050
    max_wav_value: 32768.0
  stft:
    filter_length: 1024
    hop_length: 256
    win_length: 1024
  mel:
    n_mel_channels: 80
    mel_fmin: 0
    mel_fmax: 8000
  pitch:
    feature: "phoneme_level"
    normalization: True
  energy:
    feature: "phoneme_level"
    normalization: True
